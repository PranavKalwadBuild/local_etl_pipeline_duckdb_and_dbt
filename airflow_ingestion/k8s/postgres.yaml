apiVersion: v1
kind: Service
metadata:
  name: airflow-ingestion-postgres
  namespace: airflow-ingestion
spec:
  selector:
    app: airflow-ingestion-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-ingestion-postgres-pvc
  namespace: airflow-ingestion
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-ingestion-postgres
  namespace: airflow-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-ingestion-postgres
  template:
    metadata:
      labels:
        app: airflow-ingestion-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_USER
              value: airflow
            - name: POSTGRES_PASSWORD
              value: airflow
            - name: POSTGRES_DB
              value: airflow
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: airflow-ingestion-postgres-pvc
