apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-ingestion-webserver
  namespace: airflow-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-ingestion-webserver
  template:
    metadata:
      labels:
        app: airflow-ingestion-webserver
    spec:
      containers:
        - name: webserver
          image: local/modern-data-platform-airflow-ingestion:latest
          command: ["bash", "-cx", "airflow webserver"]
          ports:
            - containerPort: 8080
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: postgresql+psycopg2://airflow:airflow@airflow-ingestion-postgres.airflow-ingestion.svc.cluster.local:5432/airflow
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /opt/airflow/project/airflow_ingestion/dags
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: PYTHONPATH
              value: /opt/airflow/project
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-ingestion-scheduler
  namespace: airflow-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-ingestion-scheduler
  template:
    metadata:
      labels:
        app: airflow-ingestion-scheduler
    spec:
      containers:
        - name: scheduler
          image: local/modern-data-platform-airflow-ingestion:latest
          command: ["bash", "-cx", "airflow scheduler"]
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: postgresql+psycopg2://airflow:airflow@airflow-ingestion-postgres.airflow-ingestion.svc.cluster.local:5432/airflow
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /opt/airflow/project/airflow_ingestion/dags
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: PYTHONPATH
              value: /opt/airflow/project
