coffee_analytics:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', '/opt/app/coffeeshop.duckdb') }}"
      threads: 1

    fusion:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', '/opt/app/coffeeshop.duckdb') }}"
      threads: 1
      # Use this target when you want to run dbt using the fusion engine.
      # You can add fusion-specific DuckDB settings here as needed.
      # settings:
      #   some_duckdb_setting: true
