services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ..:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Airflow --lastname Admin --role Admin --email admin@example.com || true"

  webserver:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow/project
      HOST_PROJECT_DIR: ${HOST_PROJECT_DIR:-${PWD}}
    volumes:
      - ..:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: airflow webserver

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow/project
      HOST_PROJECT_DIR: ${HOST_PROJECT_DIR:-${PWD}}
    volumes:
      - ..:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler

  coffee_analytics_dbt:
    build:
      context: ..
      dockerfile: coffee_analytics/Dockerfile
    image: coffee_analytics_dbt:latest
    volumes:
      - ..:/opt/app
    working_dir: /opt/app/coffee_analytics
    environment:
      DBT_DUCKDB_PATH: ${DBT_DUCKDB_PATH:-/opt/app/coffeeshop.duckdb}
      DBT_PROFILES_DIR: /opt/app/coffee_analytics
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  postgres_data:
  airflow_logs:
